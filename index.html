<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Art Style</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTUiIGZpbGw9IiMyNTYzZWIiLz48cGF0aCBmaWxsPSIjZmZmIiBkPSJtMTYgNyAyIDcgNyAyLTcgMi0yIDctMi03LTctMiA3LTJaIi8+PC9zdmc+">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .category-select {
      text-transform: uppercase;
    }

    .comparison-thumb-frame {
      position: relative;
      width: 150px;
      height: 150px;
      overflow: hidden;
      background: var(--bs-body-bg);
    }

    .comparison-thumb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--thumb-natural-w, 100%);
      height: var(--thumb-natural-h, 100%);
      transform: translate(-50%, -50%) scale(var(--thumb-cover-scale, 1));
      transform-origin: center center;
      image-rendering: auto;
      cursor: zoom-in;
    }

    .comparison-hover-preview {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, -50%) scale(var(--thumb-preview-scale, 1));
      transform-origin: center center;
      transition: transform 220ms ease, opacity 220ms ease, box-shadow 220ms ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      z-index: 2000;
      pointer-events: none;
      image-rendering: auto;
    }

    .comparison-hover-preview.is-active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href=".">LLM Art Style</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <div class="nav-item dropdown ms-auto" role="group" aria-label="Toggle dark mode" title="Toggle Dark Mode">
          <button class="dark-theme-toggle btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Toggle theme (auto)">
            <i class="bi bi-circle-half"></i> <span class="d-lg-none ms-2">Toggle theme</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><button class="dropdown-item" data-bs-theme-value="light"><i class="me-2 bi bi-sun-fill"></i> Light</button></li>
            <li><button class="dropdown-item" data-bs-theme-value="dark"><i class="me-2 bi bi-moon-stars-fill"></i> Dark</button></li>
            <li><button class="dropdown-item" data-bs-theme-value="auto"><i class="me-2 bi bi-circle-half"></i> Auto</button></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="display-1 my-4 text-center">LLM Art Style</h1>

    <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
      <span class="form-label mb-0 text-secondary small">Category</span>
      <div id="category-links" class="d-flex flex-wrap gap-2"></div>
    </div>

    <div id="status" class="d-flex align-items-center gap-2 text-secondary">
      <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
      <span>Loading configuration and images…</span>
    </div>

    <div id="grid" class="table-responsive mt-3 mx-auto"></div>
  </main>

  <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content bg-black">
        <div class="modal-header border-0">
          <h5 class="modal-title text-white" id="imageModalLabel">Image</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body d-flex align-items-center justify-content-center p-0">
          <img id="imageModalImg" class="img-fluid w-100" style="object-fit: contain; max-height: 100vh" alt="" />
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/@gramex/ui@0.3/dist/dark-theme.js" type="module"></script>
  <script type="module" src="script.js"></script>
</body>

</html>
